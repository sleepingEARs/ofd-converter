services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    volumes:
      - ofd-data:/data
    environment:
      - OFD_DATA_DIR=/data
      - OFD_DB_PATH=/data/converter.db
      - FILE_RETENTION_HOURS=24
      - LOG_RETENTION_DAYS=90
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
volumes:
  ofd-data:
